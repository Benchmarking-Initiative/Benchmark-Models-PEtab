name: Simulate
on:
  push:
    branches:
      - master
  workflow_dispatch:
  merge_group:
  schedule:
    - cron: '0 0 * * *'

jobs:
  simulate_amici:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v7

    - name: Prepare Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y swig libopenblas-dev libhdf5-dev

    - name: Install AMICI
      env:
        AMICI_PARALLEL_COMPILE: ""
      run: |
        pip install --upgrade pip
        pip install -e "src/python[simulate]"

    - name: Simulate with nominal parameters
      env:
        AMICI_PARALLEL_COMPILE: ""
      run: |
        for problem in `ls -1 Benchmark-Models/`; do
            python src/python/simulate.py "$problem" -j
            echo
            echo
        done
